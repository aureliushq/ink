{{define "content"}}
<main>
	<h2>{{.Title}}</h2>
	<p>{{.Content}}</p>
	<hr />
	<div class="flex flex-col gap-2">
		{{range .Items}}
		<a
			class="hover:bg-muted -mx-3 flex flex-col rounded-md px-3 py-2 no-underline"
			href="/{{.Slug}}"
		>
			<span>{{.Title}}</span>
			<span class="text-muted-foreground">{{.Description}}</span>
		</a>
		{{end}}
	</div>
</main>
{{end}}
